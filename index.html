// ── Black Hole (Interstellar style, huge) ──
function drawBgBlackHole(ctx, x, y) {
  const r = Math.min(W, H) * 0.3;
  const t = frameCount * 0.008;
  // Outer accretion glow
  for (let i = 5; i >= 0; i--) {
    const gr = r * (1.2 + i * 0.25);
    ctx.fillStyle = `rgba(${200 + i * 10}, ${120 + i * 15}, ${40}, ${0.03 - i * 0.004})`;
    ctx.beginPath(); ctx.ellipse(x, y, gr * 1.6, gr * 0.4, t, 0, Math.PI * 2); ctx.fill();
  }
  // Accretion disk
  ctx.strokeStyle = 'rgba(255,150,50,0.2)';
  ctx.lineWidth = r * 0.12;
  ctx.beginPath(); ctx.ellipse(x, y, r * 1.8, r * 0.4, t, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,200,80,0.12)';
  ctx.lineWidth = r * 0.2;
  ctx.beginPath(); ctx.ellipse(x, y, r * 1.4, r * 0.3, t, 0, Math.PI * 2); ctx.stroke();
  // Event horizon - pure black
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(x, y, r * 0.45, 0, Math.PI * 2); ctx.fill();
  // Photon ring
  ctx.strokeStyle = 'rgba(255,180,60,0.15)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x, y, r * 0.5, 0, Math.PI * 2); ctx.stroke();
}

// ── 2001 Monolith (tall, imposing) ──
function drawBgMonolith(ctx, x, y) {
  const s = Math.min(W, H) * 0.003;
  const w = 35 * s, h = 90 * s;
  // Faint cosmic glow behind
  const glow = ctx.createRadialGradient(x, y, h * 0.3, x, y, h * 1.2);
  glow.addColorStop(0, 'rgba(100,100,180,0.06)');
  glow.addColorStop(1, 'rgba(100,100,180,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(x, y, h * 1.2, 0, Math.PI * 2); ctx.fill();
  // Monolith body - pure black rectangle
  ctx.fillStyle = '#080808';
  ctx.fillRect(x - w / 2, y - h / 2, w, h);
  // Very subtle edge
  ctx.strokeStyle = 'rgba(60,60,80,0.4)';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x - w / 2, y - h / 2, w, h);
  // Faint starlight reflections
  const st = frameCount * 0.02;
  for (let i = 0; i < 6; i++) {
    const sx = x + Math.sin(st + i * 1.1) * w * 0.3;
    const sy = y + Math.cos(st + i * 0.8) * h * 0.35;
    ctx.fillStyle = `rgba(255,255,255,${0.04 + Math.sin(st + i) * 0.03})`;
    ctx.fillRect(sx - 1, sy - 1, 2, 2);
  }
  // Label
  ctx.fillStyle = 'rgba(100,100,140,0.4)';
  ctx.font = `${10 * s}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('TMA-1', x, y + h / 2 + 18 * s);
}

// ── Nebula (huge colorful gas cloud, Hubble style) ──
function drawBgNebula(ctx, x, y) {
  const r = Math.min(W, H) * 0.45;
  const t = frameCount * 0.003;
  // Multiple overlapping gas clouds with different colors
  const clouds = [
    { ox: -0.2, oy: -0.1, rx: 1.0, ry: 0.7, col: [120, 40, 160], rot: t },
    { ox: 0.15, oy: 0.1, rx: 0.8, ry: 0.9, col: [200, 50, 80], rot: -t * 0.7 },
    { ox: -0.05, oy: 0.2, rx: 0.9, ry: 0.6, col: [40, 100, 180], rot: t * 0.5 },
    { ox: 0.1, oy: -0.15, rx: 0.7, ry: 0.8, col: [180, 120, 40], rot: -t * 0.3 },
    { ox: 0.0, oy: 0.0, rx: 0.5, ry: 0.5, col: [220, 180, 220], rot: t * 0.2 },
  ];
  for (const c of clouds) {
    const cx = x + c.ox * r, cy = y + c.oy * r;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * Math.max(c.rx, c.ry));
    grad.addColorStop(0, `rgba(${c.col[0]},${c.col[1]},${c.col[2]},0.12)`);
    grad.addColorStop(0.4, `rgba(${c.col[0]},${c.col[1]},${c.col[2]},0.06)`);
    grad.addColorStop(1, `rgba(${c.col[0]},${c.col[1]},${c.col[2]},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(cx, cy, r * c.rx, r * c.ry, c.rot, 0, Math.PI * 2);
    ctx.fill();
  }
  // Bright core stars inside the nebula
  for (let i = 0; i < 8; i++) {
    const sx = x + Math.sin(i * 2.3 + t) * r * 0.4;
    const sy = y + Math.cos(i * 1.7 + t * 0.5) * r * 0.3;
    const brightness = 0.15 + Math.sin(frameCount * 0.04 + i) * 0.1;
    const starR = 1.5 + Math.sin(i * 3.1) * 0.8;
    ctx.fillStyle = `rgba(255,255,255,${brightness})`;
    ctx.beginPath(); ctx.arc(sx, sy, starR, 0, Math.PI * 2); ctx.fill();
    // Star glow
    const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, starR * 6);
    sg.addColorStop(0, `rgba(255,220,255,${brightness * 0.4})`);
    sg.addColorStop(1, 'rgba(255,220,255,0)');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.arc(sx, sy, starR * 6, 0, Math.PI * 2); ctx.fill();
  }
}

// ── Supernova (brilliant expanding explosion) ──
function drawBgSupernova(ctx, x, y) {
  const r = Math.min(W, H) * 0.3;
  const t = frameCount * 0.015;
  // Expanding shockwave rings
  for (let i = 0; i < 4; i++) {
    const ringR = r * (0.5 + i * 0.25 + Math.sin(t + i) * 0.05);
    const alpha = 0.08 - i * 0.015;
    ctx.strokeStyle = `rgba(255,${180 - i * 30},${80 - i * 20},${alpha})`;
    ctx.lineWidth = r * (0.06 - i * 0.01);
    ctx.beginPath(); ctx.arc(x, y, ringR, 0, Math.PI * 2); ctx.stroke();
  }
  // Outer glow - hot gas expanding
  const outerGlow = ctx.createRadialGradient(x, y, r * 0.1, x, y, r);
  outerGlow.addColorStop(0, 'rgba(255,240,200,0.15)');
  outerGlow.addColorStop(0.3, 'rgba(255,150,50,0.08)');
  outerGlow.addColorStop(0.6, 'rgba(200,50,30,0.04)');
  outerGlow.addColorStop(1, 'rgba(100,20,40,0)');
  ctx.fillStyle = outerGlow;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  // Bright core - white hot center
  const coreGlow = ctx.createRadialGradient(x, y, 0, x, y, r * 0.15);
  coreGlow.addColorStop(0, 'rgba(255,255,255,0.3)');
  coreGlow.addColorStop(0.5, 'rgba(255,220,150,0.15)');
  coreGlow.addColorStop(1, 'rgba(255,150,50,0)');
  ctx.fillStyle = coreGlow;
  ctx.beginPath(); ctx.arc(x, y, r * 0.15, 0, Math.PI * 2); ctx.fill();
  // Pulsating intensity
  const pulse = 0.7 + Math.sin(t * 3) * 0.3;
  ctx.fillStyle = `rgba(255,255,220,${0.08 * pulse})`;
  ctx.beginPath(); ctx.arc(x, y, r * 0.08, 0, Math.PI * 2); ctx.fill();
  // Ejected rays
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2 + t * 0.2;
    const rayLen = r * (0.3 + Math.sin(t * 2 + i * 1.5) * 0.15);
    const rayW = r * 0.02;
    ctx.strokeStyle = `rgba(255,${180 + Math.sin(i) * 40},80,${0.06 + Math.sin(t + i) * 0.03})`;
    ctx.lineWidth = rayW;
    ctx.beginPath();
    ctx.moveTo(x + Math.cos(angle) * r * 0.1, y + Math.sin(angle) * r * 0.1);
    ctx.lineTo(x + Math.cos(angle) * rayLen, y + Math.sin(angle) * rayLen);
    ctx.stroke();
  }
}

// ── Comet (with glowing tail) ──
function drawBgComet(ctx, x, y) {
  const s = Math.min(W, H) * 0.003;
  const t = frameCount * 0.02;
  // The comet moves slowly across the screen
  const drift = Math.sin(t * 0.3) * 30;
  const cx = x + drift, cy = y;
  // Long tail - curves away
  const tailLen = 200 * s;
  const tailGrad = ctx.createLinearGradient(cx, cy, cx + tailLen, cy - tailLen * 0.3);
  tailGrad.addColorStop(0, 'rgba(180,220,255,0.15)');
  tailGrad.addColorStop(0.3, 'rgba(100,160,220,0.08)');
  tailGrad.addColorStop(0.7, 'rgba(60,100,180,0.03)');
  tailGrad.addColorStop(1, 'rgba(40,60,120,0)');
  ctx.fillStyle = tailGrad;
  ctx.beginPath();
  ctx.moveTo(cx, cy - 4 * s);
  ctx.quadraticCurveTo(cx + tailLen * 0.5, cy - tailLen * 0.1 - 6 * s, cx + tailLen, cy - tailLen * 0.3);
  ctx.quadraticCurveTo(cx + tailLen * 0.5, cy - tailLen * 0.1 + 6 * s, cx, cy + 4 * s);
  ctx.closePath();
  ctx.fill();
  // Dust tail (slightly different angle, yellowish)
  const dustGrad = ctx.createLinearGradient(cx, cy, cx + tailLen * 0.7, cy + tailLen * 0.1);
  dustGrad.addColorStop(0, 'rgba(220,200,150,0.1)');
  dustGrad.addColorStop(0.5, 'rgba(180,160,100,0.04)');
  dustGrad.addColorStop(1, 'rgba(140,120,80,0)');
  ctx.fillStyle = dustGrad;
  ctx.beginPath();
  ctx.moveTo(cx, cy - 2 * s);
  ctx.quadraticCurveTo(cx + tailLen * 0.35, cy + tailLen * 0.02, cx + tailLen * 0.7, cy + tailLen * 0.1);
  ctx.quadraticCurveTo(cx + tailLen * 0.35, cy + tailLen * 0.05 + 4 * s, cx, cy + 3 * s);
  ctx.closePath();
  ctx.fill();
  // Coma (bright halo around nucleus)
  const coma = ctx.createRadialGradient(cx, cy, 0, cx, cy, 18 * s);
  coma.addColorStop(0, 'rgba(220,240,255,0.2)');
  coma.addColorStop(0.4, 'rgba(150,200,255,0.08)');
  coma.addColorStop(1, 'rgba(100,150,220,0)');
  ctx.fillStyle = coma;
  ctx.beginPath(); ctx.arc(cx, cy, 18 * s, 0, Math.PI * 2); ctx.fill();
  // Nucleus
  const nuc = ctx.createRadialGradient(cx, cy, 0, cx, cy, 5 * s);
  nuc.addColorStop(0, 'rgba(255,255,255,0.3)');
  nuc.addColorStop(1, 'rgba(200,220,255,0.1)');
  ctx.fillStyle = nuc;
  ctx.beginPath(); ctx.arc(cx, cy, 5 * s, 0, Math.PI * 2); ctx.fill();
}

// ── Wormhole (glowing ring portal) ──
function drawBgWormhole(ctx, x, y) {
  const r = Math.min(W, H) * 0.25;
  const t = frameCount * 0.012;
  // Outer distortion field
  const distGlow = ctx.createRadialGradient(x, y, r * 0.6, x, y, r * 1.5);
  distGlow.addColorStop(0, 'rgba(80,120,255,0.04)');
  distGlow.addColorStop(0.5, 'rgba(60,80,200,0.02)');
  distGlow.addColorStop(1, 'rgba(40,40,150,0)');
  ctx.fillStyle = distGlow;
  ctx.beginPath(); ctx.arc(x, y, r * 1.5, 0, Math.PI * 2); ctx.fill();
  // Rotating ring layers
  for (let i = 4; i >= 0; i--) {
    const ringR = r * (0.7 + i * 0.08);
    const tilt = 0.35 + Math.sin(t + i * 0.5) * 0.05;
    const rot = t * (1 + i * 0.3);
    const hue = 200 + i * 25;
    ctx.strokeStyle = `hsla(${hue}, 80%, ${55 + i * 5}%, ${0.12 - i * 0.015})`;
    ctx.lineWidth = r * (0.04 + i * 0.008);
    ctx.beginPath();
    ctx.ellipse(x, y, ringR, ringR * tilt, rot, 0, Math.PI * 2);
    ctx.stroke();
  }
  // Inner glow - the "tunnel"
  const innerGlow = ctx.createRadialGradient(x, y, 0, x, y, r * 0.5);
  innerGlow.addColorStop(0, 'rgba(150,180,255,0.12)');
  innerGlow.addColorStop(0.4, 'rgba(80,100,220,0.06)');
  innerGlow.addColorStop(1, 'rgba(20,30,80,0)');
  ctx.fillStyle = innerGlow;
  ctx.beginPath(); ctx.arc(x, y, r * 0.5, 0, Math.PI * 2); ctx.fill();
  // Center bright point - what's on the other side?
  const pulse = 0.5 + Math.sin(t * 4) * 0.5;
  const centerGlow = ctx.createRadialGradient(x, y, 0, x, y, r * 0.12);
  centerGlow.addColorStop(0, `rgba(200,220,255,${0.15 * pulse})`);
  centerGlow.addColorStop(1, 'rgba(150,180,255,0)');
  ctx.fillStyle = centerGlow;
  ctx.beginPath(); ctx.arc(x, y, r * 0.12, 0, Math.PI * 2); ctx.fill();
  // Orbiting energy sparks
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2 + t * 2;
    const sparkR = r * (0.55 + Math.sin(t * 3 + i * 2) * 0.1);
    const sx = x + Math.cos(angle) * sparkR;
    const sy = y + Math.sin(angle) * sparkR * 0.35;
    const sparkAlpha = 0.1 + Math.sin(t * 4 + i) * 0.06;
    ctx.fillStyle = `rgba(180,200,255,${sparkAlpha})`;
    ctx.beginPath(); ctx.arc(sx, sy, 2, 0, Math.PI * 2); ctx.fill();
  }
}

// ─── PIG BACK VIEW (for intro) ───
function drawPigBack(x, y, scale, flaming) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale || PIG_DRAW_SCALE, scale || PIG_DRAW_SCALE);

  // Body (back)
  ctx.fillStyle = '#ffb5c5';
  ctx.beginPath(); ctx.ellipse(0, 6, 14, 16, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#e8909f'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(0, 6, 14, 16, 0, 0, Math.PI * 2); ctx.stroke();

  // Jetpack - BIG and prominent on the back!
  ctx.fillStyle = '#556';
  // Main tank body
  ctx.beginPath();
  ctx.roundRect(-12, -6, 24, 28, 4);
  ctx.fill();
  ctx.strokeStyle = '#778'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(-12, -6, 24, 28, 4);
  ctx.stroke();
  // Tank details
  ctx.fillStyle = '#667';
  ctx.beginPath(); ctx.roundRect(-9, -3, 18, 8, 2); ctx.fill();
  // Fuel gauge
  ctx.fillStyle = '#334'; ctx.fillRect(-5, 8, 10, 4);
  ctx.fillStyle = '#44ffaa'; ctx.fillRect(-4, 9, 8, 2);
  // Nozzles at bottom
  ctx.fillStyle = '#445';
  ctx.beginPath(); ctx.roundRect(-10, 22, 7, 8, 2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(3, 22, 7, 8, 2); ctx.fill();
  ctx.fillStyle = '#556';
  ctx.fillRect(-8, 30, 3, 3);
  ctx.fillRect(5, 30, 3, 3);
  // Straps going to shoulders
  ctx.strokeStyle = '#888'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(-12, -12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(12, -12); ctx.stroke();
  // Buckle details
  ctx.fillStyle = '#aaa';
  ctx.fillRect(-13, -14, 4, 3);
  ctx.fillRect(9, -14, 4, 3);

  // Head (back, no face)
  ctx.fillStyle = '#ffb5c5';
  ctx.beginPath(); ctx.arc(0, -14, 13, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#e8909f'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, -14, 13, 0, Math.PI * 2); ctx.stroke();

  // Ears (small, pressed against helmet)
  ctx.fillStyle = '#ff9fb0';
  ctx.beginPath(); ctx.ellipse(-10, -24, 4, 5, -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10, -24, 4, 5, 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff8095';
  ctx.beginPath(); ctx.ellipse(-10, -24, 2.5, 3, -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10, -24, 2.5, 3, 0.3, 0, Math.PI * 2); ctx.fill();

  // ── Space helmet (back view) ──
  ctx.strokeStyle = 'rgba(180,220,255,0.4)';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(0, -14, 17, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = 'rgba(150,190,230,0.05)';
  ctx.beginPath(); ctx.arc(0, -14, 17, 0, Math.PI * 2); ctx.fill();
  // Metal rim
  ctx.strokeStyle = '#889';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(0, -14, 17, 0.6, Math.PI - 0.6); ctx.stroke();
  // Back bolts
  ctx.fillStyle = '#99a';
  ctx.beginPath(); ctx.arc(-11, -3, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(11, -3, 2, 0, Math.PI * 2); ctx.fill();
  // Back reflection
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(5, -24, 6, -Math.PI * 0.6, Math.PI * 0.1); ctx.stroke();

  // Curly tail (prominent from behind!)
  ctx.strokeStyle = '#ff9fb0'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, 20);
  ctx.bezierCurveTo(8, 18, 12, 24, 8, 27);
  ctx.bezierCurveTo(4, 30, 0, 26, 4, 23);
  ctx.stroke();

  // Little hooves
  ctx.fillStyle = '#cc8090';
  ctx.beginPath(); ctx.ellipse(-7, 22, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7, 22, 4, 3, 0, 0, Math.PI * 2); ctx.fill();

  // Jetpack flames when firing
  if (flaming) {
    const t = Date.now() * 0.01;
    // Left nozzle flame
    const lLen = 12 + Math.sin(t * 3) * 5;
    const lGrad = ctx.createLinearGradient(-7, 30, -7, 30 + lLen);
    lGrad.addColorStop(0, '#ffdd00');
    lGrad.addColorStop(0.3, '#ff6600');
    lGrad.addColorStop(0.7, '#ff3300');
    lGrad.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = lGrad;
    ctx.beginPath();
    ctx.moveTo(-10, 30); ctx.lineTo(-4, 30);
    ctx.lineTo(-7 + Math.sin(t * 5) * 2, 30 + lLen);
    ctx.closePath(); ctx.fill();
    // Right nozzle flame
    const rLen = 12 + Math.cos(t * 3.5) * 5;
    const rGrad = ctx.createLinearGradient(7, 30, 7, 30 + rLen);
    rGrad.addColorStop(0, '#ffdd00');
    rGrad.addColorStop(0.3, '#ff6600');
    rGrad.addColorStop(0.7, '#ff3300');
    rGrad.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = rGrad;
    ctx.beginPath();
    ctx.moveTo(4, 30); ctx.lineTo(10, 30);
    ctx.lineTo(7 + Math.sin(t * 4.5) * 2, 30 + rLen);
    ctx.closePath(); ctx.fill();
    // Inner bright core
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.6 + Math.sin(t * 6) * 0.3;
    ctx.beginPath(); ctx.ellipse(-7, 32, 2, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(7, 32, 2, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ─── PIG FRONT VIEW (normal gameplay) ───
function drawPig(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle || 0);
  ctx.scale(PIG_DRAW_SCALE, PIG_DRAW_SCALE);

  // Shield bubble
  if (pig && pig.shield) {
    ctx.save(); ctx.scale(1/PIG_DRAW_SCALE, 1/PIG_DRAW_SCALE);
    ctx.strokeStyle = `rgba(100,200,255,${0.3 + Math.sin(frameCount * 0.1) * 0.2})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, PIG_SIZE + 10, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = 'rgba(100,200,255,0.05)'; ctx.fill();
    ctx.restore();
  }

  // Magnet glow
  if (pig && pig.magnet) {
    ctx.save(); ctx.scale(1/PIG_DRAW_SCALE, 1/PIG_DRAW_SCALE);
    ctx.fillStyle = `rgba(255,100,255,${0.05 + Math.sin(frameCount * 0.08) * 0.03})`;
    ctx.beginPath(); ctx.arc(0, 0, 60, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  if (pig && pig.invincibleTimer > 0 && frameCount % 4 < 2) {
    ctx.globalAlpha = 0.4;
  }

  // Jetpack (behind body, subtle from front)
  ctx.fillStyle = '#556';
  ctx.fillRect(-16, -2, 5, 20); ctx.fillRect(11, -2, 5, 20);
  ctx.fillStyle = '#667';
  ctx.fillRect(-15, 18, 3, 5); ctx.fillRect(12, 18, 3, 5);
  // Straps
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-11, 0); ctx.lineTo(-6, -8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(11, 0); ctx.lineTo(6, -8); ctx.stroke();

  // Body
  ctx.fillStyle = '#ffb5c5';
  ctx.beginPath(); ctx.ellipse(0, 6, 14, 16, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#e8909f'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(0, 6, 14, 16, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = 'rgba(255,220,230,0.4)';
  ctx.beginPath(); ctx.ellipse(0, 8, 8, 10, 0, 0, Math.PI * 2); ctx.fill();

  // Head
  ctx.fillStyle = '#ffb5c5';
  ctx.beginPath(); ctx.arc(0, -12, 14, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#e8909f'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, -12, 14, 0, Math.PI * 2); ctx.stroke();

  // Ears (small, pressed against helmet)
  ctx.fillStyle = '#ff9fb0';
  ctx.beginPath(); ctx.ellipse(-11, -24, 4, 5, -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(11, -24, 4, 5, 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff8095';
  ctx.beginPath(); ctx.ellipse(-11, -24, 2.5, 3, -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(11, -24, 2.5, 3, 0.3, 0, Math.PI * 2); ctx.fill();

  // Eyes — symmetric, calm, centered
  const t = frameCount * 0.03;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(-5, -14, 5, 5.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5, -14, 5, 5.5, 0, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#222';
  if (pigMood === 'panic') {
    // Wide eyes, small pupils
    ctx.beginPath(); ctx.arc(-5, -14, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, -14, 1.5, 0, Math.PI * 2); ctx.fill();
  } else if (pigMood === 'happy') {
    // Soft closed happy eyes
    ctx.strokeStyle = '#222'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(-5, -13, 3, Math.PI * 0.15, Math.PI * 0.85); ctx.stroke();
    ctx.beginPath(); ctx.arc(5, -13, 3, Math.PI * 0.15, Math.PI * 0.85); ctx.stroke();
  } else {
    // Calm, centered pupils with gentle drift
    const drift = Math.sin(t) * 0.4;
    ctx.beginPath(); ctx.arc(-5 + drift, -14, 2.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(5 + drift, -14, 2.2, 0, Math.PI * 2); ctx.fill();
  }

  // Eye shine (symmetric)
  if (pigMood !== 'happy') {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-6.2, -15.5, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(3.8, -15.5, 1.2, 0, Math.PI * 2); ctx.fill();
  }

  // Snout
  ctx.fillStyle = '#ff9fb0';
  ctx.beginPath(); ctx.ellipse(0, -6, 7, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#e07888'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(0, -6, 7, 5, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#d06878';
  ctx.beginPath(); ctx.ellipse(-2.5, -6, 1.8, 2.2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2.5, -6, 1.8, 2.2, 0, 0, Math.PI * 2); ctx.fill();

  // Mouth — subtle, calm
  ctx.strokeStyle = '#cc6878'; ctx.lineWidth = 1.5;
  if (pigMood === 'panic') {
    ctx.beginPath(); ctx.ellipse(0, -1, 3, 3, 0, 0, Math.PI * 2); ctx.stroke();
  } else if (pigMood === 'happy') {
    ctx.beginPath(); ctx.arc(0, -2, 5, 0.15, Math.PI - 0.15); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(0, -2, 4, 0.3, Math.PI - 0.3); ctx.stroke();
  }

  // ── Space helmet (escafandra) ──
  // Glass dome over the head
  ctx.strokeStyle = 'rgba(180,220,255,0.5)';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(0, -12, 18, 0, Math.PI * 2); ctx.stroke();
  // Glass fill — very subtle tint
  ctx.fillStyle = 'rgba(180,220,255,0.06)';
  ctx.beginPath(); ctx.arc(0, -12, 18, 0, Math.PI * 2); ctx.fill();
  // Helmet rim (metal ring at neck)
  ctx.strokeStyle = '#889';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(0, -12, 18, 0.6, Math.PI - 0.6); ctx.stroke();
  // Helmet top bolts
  ctx.fillStyle = '#99a';
  ctx.beginPath(); ctx.arc(-12, -1, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(12, -1, 2, 0, Math.PI * 2); ctx.fill();
  // Glass reflection — curved highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(-5, -18, 10, -Math.PI * 0.7, -Math.PI * 0.2); ctx.stroke();
  // Small secondary reflection
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(7, -22, 4, -Math.PI * 0.5, Math.PI * 0.1); ctx.stroke();

  // Curly tail
  ctx.strokeStyle = '#ff9fb0'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-6, 18);
  ctx.bezierCurveTo(-14, 16, -16, 22, -12, 24);
  ctx.bezierCurveTo(-8, 26, -6, 22, -10, 20);
  ctx.stroke();

  // Hooves
  ctx.fillStyle = '#cc8090';
  ctx.beginPath(); ctx.ellipse(-6, 22, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6, 22, 4, 3, 0, 0, Math.PI * 2); ctx.fill();

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawFuelOrb(f) {
  const sy = f.y - cameraY;
  if (sy < -30 || sy > H + 30) return;
  const p = 0.8 + Math.sin(frameCount * 0.06 + f.pulse) * 0.2;
  ctx.beginPath(); ctx.arc(f.x, sy, FUEL_RADIUS * 2 * p, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(68,255,170,0.06)'; ctx.fill();
  ctx.beginPath(); ctx.arc(f.x, sy, FUEL_RADIUS * p, 0, Math.PI * 2);
  const g = ctx.createRadialGradient(f.x-2, sy-2, 1, f.x, sy, FUEL_RADIUS*p);
  g.addColorStop(0, '#aaffdd'); g.addColorStop(0.5, '#44ffaa'); g.addColorStop(1, '#22aa66');
  ctx.fillStyle = g; ctx.fill();
  ctx.beginPath(); ctx.arc(f.x-3, sy-3, 3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
  ctx.fillText('F', f.x, sy + 3);
}

function drawAsteroid(a) {
  const sy = a.y - cameraY;
  if (sy < -50 || sy > H + 50) return;
  ctx.save();
  ctx.translate(a.x, sy);
  ctx.rotate(a.rot);
  ctx.beginPath();
  ctx.moveTo(a.verts[0].x, a.verts[0].y);
  for (let i = 1; i < a.verts.length; i++) ctx.lineTo(a.verts[i].x, a.verts[i].y);
  ctx.closePath();
  ctx.fillStyle = '#554433'; ctx.fill();
  ctx.strokeStyle = '#887766'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#443322';
  ctx.beginPath(); ctx.arc(a.r*0.2, -a.r*0.1, a.r*0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-a.r*0.3, a.r*0.2, a.r*0.15, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPowerup(p) {
  const sy = p.y - cameraY;
  if (sy < -30 || sy > H + 30) return;
  const pulse = 0.85 + Math.sin(frameCount * 0.07 + p.pulse) * 0.15;
  const r = 12 * pulse;

  let color, icon, glowColor;
  if (p.type === 'superfuel') { color = '#ffd700'; icon = '★'; glowColor = 'rgba(255,215,0,0.1)'; }
  else if (p.type === 'shield') { color = '#66ccff'; icon = '◆'; glowColor = 'rgba(100,200,255,0.1)'; }
  else { color = '#ff66ff'; icon = '◎'; glowColor = 'rgba(255,100,255,0.1)'; }

  ctx.beginPath(); ctx.arc(p.x, sy, r * 2.5, 0, Math.PI * 2);
  ctx.fillStyle = glowColor; ctx.fill();
  ctx.beginPath(); ctx.arc(p.x, sy, r, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
  ctx.fillText(icon, p.x, sy + 4);
}

function drawComboTrails() {
  for (const t of comboTrails) {
    const sy1 = t.y1 - cameraY, sy2 = t.y2 - cameraY;
    if (sy1 > H + 50 && sy2 > H + 50) continue;
    const color = t.color || '#44ffaa';
    // Glow line
    ctx.globalAlpha = t.life * 0.15;
    ctx.strokeStyle = color;
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(t.x1, sy1); ctx.lineTo(t.x2, sy2); ctx.stroke();
    // Core line
    ctx.globalAlpha = t.life * 0.5;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawParticles() {
  for (const p of particles) {
    const sy = p.y - cameraY;
    if (sy < -20 || sy > H + 20) continue;
    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, sy, p.size * p.life, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawSouls() {
  for (const s of souls) {
    if (s.delay > 0) continue;
    const alpha = 0.25 * (1 - s.progress);
    ctx.globalAlpha = alpha;
    // Soft glow halo
    const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * 3);
    g.addColorStop(0, s.color);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size * 3, 0, Math.PI * 2); ctx.fill();
    // Bright core
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size * 0.4, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawTexts() {
  for (const t of texts) {
    ctx.globalAlpha = t.life;
    ctx.fillStyle = t.color;
    ctx.font = t.big ? 'bold 22px monospace' : 'bold 14px monospace';
    ctx.textAlign = 'center';
    const y = t.big ? t.y : t.y - cameraY;
    ctx.fillText(t.text, t.x, y);
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  const totalScore = meters + bonusPoints;
  // Meters
  ctx.fillStyle = '#fff'; ctx.font = 'bold 24px monospace'; ctx.textAlign = 'left';
  ctx.fillText(`${meters}m`, 15, 32);
  // Bonus points
  if (bonusPoints > 0) {
    ctx.fillStyle = '#ffee44'; ctx.font = 'bold 13px monospace';
    ctx.fillText(`+${bonusPoints}`, 15, 50);
  }
  // Combo chain
  if (combo > 1) {
    ctx.fillStyle = '#ff9944'; ctx.font = 'bold 16px monospace'; ctx.textAlign = 'left';
    ctx.globalAlpha = 0.5 + Math.sin(frameCount * 0.15) * 0.5;
    ctx.fillText(`x${combo}`, 15, 68);
    ctx.globalAlpha = 1;
  }

  const maxShow = Math.min(pig.fuel, 15);
  for (let i = 0; i < maxShow; i++) {
    ctx.fillStyle = '#44ffaa';
    ctx.beginPath(); ctx.arc(W - 20 - i * 18, 25, 7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'center';
    ctx.fillText('F', W - 20 - i * 18, 28);
  }
  if (pig.fuel > 15) {
    ctx.fillStyle = '#44ffaa'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'right';
    ctx.fillText(`+${pig.fuel - 15}`, W - 20 - 15 * 18 - 5, 28);
  }

  // Rocket bar: thin red line below fuel orbs
  if (pig.rocketTimer > 0) {
    const barW = Math.min(maxShow * 18, 150);
    const barX = W - 20 - barW;
    const fill = pig.rocketTimer / (7 * 60);
    // Background
    ctx.fillStyle = 'rgba(255,60,60,0.2)';
    ctx.fillRect(barX, 38, barW, 3);
    // Fill
    const pulse = 0.7 + Math.sin(frameCount * 0.12) * 0.3;
    ctx.fillStyle = `rgba(255,60,60,${0.6 * pulse})`;
    ctx.fillRect(barX, 38, barW * fill, 3);
    // Glow
    ctx.fillStyle = `rgba(255,100,60,${0.15 * pulse})`;
    ctx.fillRect(barX, 36, barW * fill, 7);
    // Timer text
    ctx.fillStyle = '#ff6644'; ctx.font = '9px monospace'; ctx.textAlign = 'right';
    ctx.fillText(`ROCKET ${Math.ceil(pig.rocketTimer / 60)}s`, W - 15, 50);
  }

  let py = 55 + (pig.rocketTimer > 0 ? 14 : 0);
  if (pig.shield) {
    ctx.fillStyle = '#66ccff'; ctx.font = '11px monospace'; ctx.textAlign = 'right';
    ctx.fillText(`SHIELD ${Math.ceil(pig.shieldTimer / 60)}s`, W - 15, py); py += 16;
  }
  if (pig.magnet) {
    ctx.fillStyle = '#ff66ff'; ctx.font = '11px monospace'; ctx.textAlign = 'right';
    ctx.fillText(`MAGNET ${Math.ceil(pig.magnetTimer / 60)}s`, W - 15, py); py += 16;
  }

  if (pig.fuel === 0 && Math.sin(frameCount * 0.1) > 0) {
    ctx.fillStyle = '#ff4444'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
    ctx.fillText('NO FUEL!', W / 2, 65);
  }

  ctx.fillStyle = '#333'; ctx.fillRect(15, H - 20, 60, 4);
  ctx.fillStyle = difficulty < 0.4 ? '#44ffaa' : difficulty < 0.7 ? '#feca57' : '#ff4444';
  ctx.fillRect(15, H - 20, 60 * difficulty, 4);

  ctx.fillStyle = '#4a4a6a'; ctx.font = '9px monospace'; ctx.textAlign = 'left';
  ctx.fillText(`RECORD: ${highScore}`, 15, H - 6);

  // Virtual joystick
  const isMobileDevice = 'ontouchstart' in window;
  if (isMobileDevice) {
    if (joystick.active) {
      // Outer ring
      ctx.globalAlpha = 0.25;
      ctx.beginPath();
      ctx.arc(joystick.cx, joystick.cy, joystick.radius + 10, 0, Math.PI * 2);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Thumb position
      const thumbX = joystick.cx + joystick.dx * joystick.radius;
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.arc(thumbX, joystick.cy, 18, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      // Idle hint: show a ghost joystick in bottom-right
      const hintX = 60;
      const hintY = H - 110;
      ctx.globalAlpha = 0.15;
      ctx.beginPath();
      ctx.arc(hintX, hintY, joystick.radius + 10, 0, Math.PI * 2);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(hintX, hintY, 14, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      // Left/right arrows
      ctx.font = '14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('◄ ►', hintX, hintY + 35);
      ctx.globalAlpha = 1;
    }
  }
}

function drawMenu() {
  drawBg(); drawStars();
  const bobY = Math.sin(Date.now() / 600) * 8;
  drawPig(W / 2, H / 3 + bobY);
  if (Math.random() > 0.7) {
    particles.push({
      x: W/2 + (Math.random()-0.5)*6, y: H/3 + bobY + 16,
      vx: (Math.random()-0.5), vy: Math.random() + 0.5,
      life: 0.8, decay: 0.04, size: 2 + Math.random()*2,
      color: Math.random() > 0.4 ? '#77cc33' : '#aadd44'
    });
  }
  drawParticles();

  ctx.fillStyle = '#fff'; ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center';
  ctx.fillText('SPACE', W/2, H/2 + 20);
  ctx.fillStyle = '#ffb5c5';
  ctx.fillText('PIG', W/2, H/2 + 58);

  ctx.fillStyle = '#8888aa'; ctx.font = '12px monospace';
  const isMobile = 'ontouchstart' in window;
  const instructions = isMobile
    ? ['Left joystick : Move', 'Tap : Boost', 'You pass through walls', '',
       'Collect fuel ● Dodge asteroids', 'Find power-ups ★ ◆ ◎']
    : ['← → : Move', 'SPACE / Click : Boost', 'You pass through walls', '',
       'Collect fuel ● Dodge asteroids', 'Find power-ups ★ ◆ ◎'];
  instructions.forEach((l, i) => ctx.fillText(l, W/2, H/2 + 95 + i * 20));

  const pulse = 0.5 + Math.sin(Date.now()/500) * 0.5;
  ctx.fillStyle = `rgba(255,255,255,${0.4+pulse*0.6})`;
  ctx.font = 'bold 16px monospace';
  ctx.fillText(isMobile ? 'TAP TO PLAY' : 'SPACE or CLICK', W/2, H - 70);
  if (highScore > 0) {
    ctx.fillStyle = '#feca57'; ctx.font = '13px monospace';
    ctx.fillText(`Record: ${highScore}`, W/2, H - 45);
  }
}

function drawIntro() {
  drawBg(); drawStars();

  const pigY = pig.y - cameraY;

  // Phase 1: Showing back (0 to INTRO_PHASE_BOOST)
  if (introTimer < INTRO_PHASE_BOOST) {
    drawPigBack(pig.x, pigY, PIG_DRAW_SCALE);

    // "3... 2... 1..." countdown
    const countdown = Math.ceil((INTRO_PHASE_BOOST - introTimer) / 20);
    if (countdown <= 3 && countdown >= 1) {
      ctx.fillStyle = '#fff'; ctx.font = 'bold 40px monospace'; ctx.textAlign = 'center';
      ctx.globalAlpha = 0.6 + Math.sin(introTimer * 0.3) * 0.4;
      ctx.fillText(countdown.toString(), W / 2, H / 3 - 20);
      ctx.globalAlpha = 1;
    }
  }
  // Phase 2: Boost fired, still showing back or transition (BOOST to TURN)
  else if (introTimer < INTRO_PHASE_TURN) {
    // Smooth horizontal squish = "turning" effect
    const turnProgress = (introTimer - INTRO_PHASE_BOOST) / (INTRO_PHASE_TURN - INTRO_PHASE_BOOST);

    ctx.save();
    ctx.translate(pig.x, pigY);

    if (turnProgress < 0.5) {
      // Squish back view to nothing (0 -> thin)
      const scaleX = 1 - turnProgress * 2; // 1 -> 0
      ctx.scale(scaleX, 1);
      ctx.translate(-pig.x, -pigY);
      drawPigBack(pig.x, pigY, PIG_DRAW_SCALE, true);
    } else {
      // Expand front view from nothing (0 -> 1)
      const scaleX = (turnProgress - 0.5) * 2; // 0 -> 1
      ctx.scale(scaleX, 1);
      ctx.translate(-pig.x, -pigY);
      drawPig(pig.x, pigY, 0);
    }
    ctx.restore();

    // "IGNITION!" text
    if (introTimer < INTRO_PHASE_BOOST + 40) {
      const alpha = 1 - (introTimer - INTRO_PHASE_BOOST) / 40;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#ff9933'; ctx.font = 'bold 28px monospace'; ctx.textAlign = 'center';
      ctx.fillText('IGNITION!', W / 2, H / 3 - 30);
      ctx.globalAlpha = 1;
    }
  }
  // Phase 3: Fully turned, ready (TURN to DURATION)
  else {
    drawPig(pig.x, pigY, 0);

    // "GO!" text
    const alpha = 1 - (introTimer - INTRO_PHASE_TURN) / (INTRO_DURATION - INTRO_PHASE_TURN);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#44ffaa'; ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center';
    ctx.fillText('GO!', W / 2, H / 3 - 30);
    ctx.globalAlpha = 1;
  }

  drawParticles();
}

function drawGameOver() {
  const totalScore = meters + bonusPoints;
  ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff6b6b'; ctx.font = 'bold 36px monospace';
  ctx.fillText('GAME OVER', W/2, H/3);
  // Distance
  ctx.fillStyle = '#fff'; ctx.font = 'bold 28px monospace';
  ctx.fillText(`${meters}m`, W/2, H/3 + 45);
  // Bonus breakdown
  if (bonusPoints > 0) {
    ctx.fillStyle = '#ffee44'; ctx.font = '16px monospace';
    ctx.fillText(`bonus: +${bonusPoints}`, W/2, H/3 + 70);
  }
  // Total
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px monospace';
  ctx.fillText(`TOTAL: ${totalScore}`, W/2, H/3 + (bonusPoints > 0 ? 100 : 75));
  if (totalScore >= highScore && totalScore > 0) {
    ctx.fillStyle = '#feca57'; ctx.font = 'bold 16px monospace';
    ctx.fillText('NEW RECORD!', W/2, H/3 + (bonusPoints > 0 ? 130 : 105));
  }
  if (gameOverTimer <= 0) {
    const pulse = 0.5 + Math.sin(Date.now()/500) * 0.5;
    ctx.fillStyle = `rgba(255,255,255,${0.4+pulse*0.6})`; ctx.font = '14px monospace';
    ctx.fillText('ontouchstart' in window ? 'TAP TO RESTART' : 'SPACE or CLICK', W/2, H/2 + 50);
  }
}

// ─── MAIN LOOP (fixed 60fps physics) ───
const FIXED_DT = 1000 / 60;
let accumulator = 0;
let lastTime = 0;

function gameLoop(timestamp) {
  if (lastTime === 0) lastTime = timestamp;
  let elapsed = timestamp - lastTime;
  lastTime = timestamp;
  if (elapsed > 100) elapsed = 100;

  accumulator += elapsed;
  while (accumulator >= FIXED_DT) {
    update();
    accumulator -= FIXED_DT;
  }

  ctx.save();
  if (shakeTimer > 0) {
    const s = shakeIntensity * (shakeTimer / 15);
    ctx.translate((Math.random()-.5)*s, (Math.random()-.5)*s);
  }

  if (state === 'menu') {
    drawMenu();
  } else if (state === 'intro') {
    drawIntro();
  } else {
    drawBg(); drawStars(); drawScenery();
    drawComboTrails();
    for (const a of asteroids) drawAsteroid(a);
    for (const f of fuels) drawFuelOrb(f);
    for (const p of powerups) drawPowerup(p);
    if (pig && pig.alive) drawPig(pig.x, pig.y - cameraY, pig.angle);
    drawParticles(); drawTexts(); drawSouls();
    // Rocket activation flash — red/orange screen tint
    if (rocketFlash > 0) {
      const alpha = (rocketFlash / 30) * 0.25;
      ctx.fillStyle = `rgba(255,80,20,${alpha})`;
      ctx.fillRect(0, 0, W, H);
    }
    if (pig) drawHUD();
    if (state === 'gameover') drawGameOver();
  }

  ctx.restore();
  requestAnimationFrame(gameLoop);
}

PokiSDK.init().then(() => {
  PokiSDK.gameLoadingFinished();
  initStars();
  requestAnimationFrame(gameLoop);
}).catch(() => {
  initStars();
  requestAnimationFrame(gameLoop);
});
</script>
