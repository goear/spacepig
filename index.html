<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
let S = 1;
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const screenW = window.innerWidth;
  const screenH = window.innerHeight;
  const refH = screenW > screenH ? 600 : 844;
  S = screenH / refH;
  H = refH;
  W = Math.round(screenW / S);
  canvas.width = screenW * dpr;
  canvas.height = screenH * dpr;
  canvas.style.width = screenW + 'px';
  canvas.style.height = screenH + 'px';
  canvas.style.left = '0px';
  ctx.setTransform(S * dpr, 0, 0, S * dpr, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── AUDIO ───
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let masterGain = null;
let reverbGain = null;
let dryGain = null;
let sfxFilter = null;
let reverbBuf = null;
let musicStarted = false;

function ensureAudio() {
  if (audioCtx) return;
  audioCtx = new AudioCtx();
  // Master output chain: sfxFilter → dry/wet split → destination
  sfxFilter = audioCtx.createBiquadFilter();
  sfxFilter.type = 'lowpass';
  sfxFilter.frequency.value = 2800;
  sfxFilter.Q.value = 0.6;
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 1.0;
  dryGain = audioCtx.createGain();
  dryGain.gain.value = 0.7;
  reverbGain = audioCtx.createGain();
  reverbGain.gain.value = 0.3;
  sfxFilter.connect(dryGain);
  dryGain.connect(masterGain);
  // Build reverb impulse response
  const revLen = audioCtx.sampleRate * 1.5;
  reverbBuf = audioCtx.createBuffer(2, revLen, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = reverbBuf.getChannelData(ch);
    for (let i = 0; i < revLen; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / revLen, 2.5);
    }
  }
  const convolver = audioCtx.createConvolver();
  convolver.buffer = reverbBuf;
  sfxFilter.connect(convolver);
  convolver.connect(reverbGain);
  reverbGain.connect(masterGain);
  masterGain.connect(audioCtx.destination);
}

// Route a node through the shared reverb chain
function getSfxDest() { return sfxFilter; }

// Soft tone: sine/triangle only, routed through reverb
function playTone(freq, dur, type, vol, slide) {
  ensureAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, t);
  if (slide) osc.frequency.linearRampToValueAtTime(slide, t + dur);
  // Gentle attack to avoid clicks
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol || 0.08, t + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(gain);
  gain.connect(getSfxDest());
  osc.start(t);
  osc.stop(t + dur);
}

// Filtered noise (soft whoosh, not harsh static)
function playNoise(dur, vol, cutoff) {
  ensureAudio();
  const t = audioCtx.currentTime;
  const bufSize = audioCtx.sampleRate * dur;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = cutoff || 1500;
  filter.Q.value = 1;
  src.buffer = buf;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol || 0.06, t + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(filter);
  filter.connect(gain);
  gain.connect(getSfxDest());
  src.start(t);
}

// ─── BACKGROUND MUSIC (Interstellar organ — arpeggiated chord progressions) ───
const music = {
  reverb: null, masterGain: null, filter: null,
  dryGain: null, wetGain: null,
  prog: null, chordIdx: 0,
  arp: null, arpIdx: 0,
  noteTimer: 0, tempo: 58,
  notesPlayed: 0, notesPerChord: 12,
  bassPlayed: false,
};

// 8 chord progressions across different keys and moods
const PROGRESSIONS = [
  // A minor: Am – F – C – G
  [[110,164.81,220,261.63],[174.61,220,261.63,349.23],[130.81,196,261.63,329.63],[196,246.94,293.66,392]],
  // C minor: Cm – Ab – Eb – Bb
  [[130.81,196,261.63,311.13],[207.65,261.63,311.13,415.30],[155.56,233.08,311.13,392],[116.54,174.61,233.08,293.66]],
  // D minor: Dm – Bb – F – C
  [[146.83,220,293.66,349.23],[116.54,174.61,233.08,293.66],[174.61,261.63,349.23,440],[130.81,196,261.63,329.63]],
  // E minor: Em – C – G – D
  [[164.81,246.94,329.63,392],[130.81,196,261.63,329.63],[196,293.66,392,493.88],[146.83,220,293.66,370]],
  // F minor: Fm – Db – Ab – Eb
  [[174.61,261.63,349.23,415.30],[138.59,207.65,277.18,349.23],[207.65,311.13,415.30,523.25],[155.56,233.08,311.13,392]],
  // B minor: Bm – G – D – A (bright, higher register)
  [[123.47,185,246.94,370],[196,293.66,392,493.88],[146.83,220,293.66,440],[110,220,329.63,440]],
  // G minor: Gm – Eb – Bb – F (deep, dark)
  [[98,146.83,196,233.08],[155.56,196,233.08,311.13],[116.54,174.61,233.08,293.66],[174.61,220,261.63,349.23]],
  // Bb minor: Bbm – Gb – Db – Ab (unusual, dreamy)
  [[116.54,174.61,233.08,277.18],[185,233.08,277.18,370],[138.59,207.65,277.18,349.23],[207.65,261.63,311.13,415.30]],
];

// Arpeggio patterns — indices into the 4-note chords
const ARP_PATTERNS = [
  [0, 1, 2, 3, 2, 1],     // wave up-down
  [0, 2, 1, 3],            // interlocked
  [3, 2, 1, 0, 1, 2],     // wave down-up
  [0, 3, 1, 2],            // wide leap then fill
  [0, 1, 3, 2, 0, 3],     // zigzag with leaps
];

// Synthetic cathedral reverb (~5s tail)
function createCathedralIR() {
  const dur = 5, sr = audioCtx.sampleRate, len = sr * dur;
  const ir = audioCtx.createBuffer(2, len, sr);
  for (let ch = 0; ch < 2; ch++) {
    const d = ir.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      const t = i / sr;
      const pre = t < 0.03 ? 0.05 : 1;
      const early = t < 0.1 ? Math.exp(-t * 15) * 0.35 : 0;
      const late = Math.exp(-t * 1.1);
      d[i] = (Math.random() * 2 - 1) * (early + late) * pre;
    }
  }
  return ir;
}

function randomizeMusic() {
  music.prog = PROGRESSIONS[Math.floor(Math.random() * PROGRESSIONS.length)];
  music.arp = ARP_PATTERNS[Math.floor(Math.random() * ARP_PATTERNS.length)];
  music.chordIdx = Math.floor(Math.random() * 4);  // start on random chord
  music.arpIdx = 0;
  music.notesPlayed = 0;
  music.bassPlayed = false;
  music.baseTempo = 60 + Math.floor(Math.random() * 40);  // 60-100 frames (~1.0-1.7s)
  music.tempo = music.baseTempo;
  music.notesPerChord = music.arp.length * (2 + Math.floor(Math.random() * 2));
  // Random octave shift: sometimes play everything an octave higher
  music.octaveShift = Math.random() < 0.3 ? 2 : 1;
}

// Play one organ note — 4 organ stops, short attack, natural decay
function playOrganNote(freq, velocity, duration) {
  if (!audioCtx || !music.filter || freq <= 0) return;
  const t = audioCtx.currentTime;
  const partials = [
    { mult: 1, amp: 1.0  },   // 8' fundamental
    { mult: 2, amp: 0.45 },   // 4' octave
    { mult: 3, amp: 0.18 },   // 2⅔' twelfth
    { mult: 4, amp: 0.08 },   // 2' super octave
  ];
  const noteGain = audioCtx.createGain();
  noteGain.gain.setValueAtTime(0, t);
  noteGain.gain.linearRampToValueAtTime(velocity, t + 0.08);
  noteGain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
  noteGain.connect(music.filter);
  for (const p of partials) {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq * p.mult;
    const pGain = audioCtx.createGain();
    pGain.gain.value = p.amp;
    osc.connect(pGain);
    pGain.connect(noteGain);
    osc.start(t);
    osc.stop(t + duration + 0.05);
  }
}

function startMusic() {
  if (musicStarted) return;
  musicStarted = true;
  ensureAudio();
  randomizeMusic();

  music.reverb = audioCtx.createConvolver();
  music.reverb.buffer = createCathedralIR();

  music.filter = audioCtx.createBiquadFilter();
  music.filter.type = 'lowpass';
  music.filter.frequency.value = 2200;
  music.filter.Q.value = 0.3;

  music.dryGain = audioCtx.createGain();
  music.dryGain.gain.value = 0.3;
  music.wetGain = audioCtx.createGain();
  music.wetGain.gain.value = 0.7;

  music.masterGain = audioCtx.createGain();
  music.masterGain.gain.value = 0;

  music.filter.connect(music.dryGain);
  music.filter.connect(music.wetGain);
  music.dryGain.connect(music.masterGain);
  music.wetGain.connect(music.reverb);
  music.reverb.connect(music.masterGain);
  music.masterGain.connect(audioCtx.destination);

  const t = audioCtx.currentTime;
  music.masterGain.gain.linearRampToValueAtTime(0.68, t + 2);
  music.noteTimer = 0;
}

function updateMusic() {
  if (!musicStarted || !audioCtx || !music.prog) return;
  const t = audioCtx.currentTime;

  let targetVol = 0.55;
  if (state === 'playing') targetVol = 0.68;
  else if (state === 'gameover') targetVol = 0.25;
  const cur = music.masterGain.gain.value;
  if (Math.abs(cur - targetVol) > 0.05) {
    music.masterGain.gain.linearRampToValueAtTime(targetVol, t + 2);
  }

  // Accelerate tempo ~3% per 100m (caps at -45% around 1500m)
  const speedup = 1 - Math.min(Math.floor(meters / 100), 15) * 0.03;
  music.tempo = Math.max(25, Math.floor(music.baseTempo * speedup));

  music.noteTimer++;
  if (music.noteTimer >= music.tempo) {
    music.noteTimer = 0;

    // Advance chord when arp has cycled enough times
    if (music.notesPlayed >= music.notesPerChord) {
      music.notesPlayed = 0;
      music.chordIdx = (music.chordIdx + 1) % music.prog.length;
      music.bassPlayed = false;
    }

    const chord = music.prog[music.chordIdx];
    const ni = music.arp[music.arpIdx % music.arp.length];
    const isAccent = (music.arpIdx === 0);
    music.arpIdx = (music.arpIdx + 1) % music.arp.length;
    music.notesPlayed++;

    const os = music.octaveShift || 1;
    // Velocity: accent on first beat of each arp cycle
    const vel = (0.028 + Math.random() * 0.010) * (isAccent ? 1.4 : 1.0);
    playOrganNote(chord[ni] * os, vel, 2.0 + Math.random() * 0.4);

    // Bass note on each chord change — anchors the harmony
    if (!music.bassPlayed) {
      music.bassPlayed = true;
      playOrganNote(chord[0] * os / 2, vel * 0.45, 3.5);
    }

    // At higher altitudes, occasionally double with upper octave
    if (meters > 500 && Math.random() < 0.2) {
      playOrganNote(chord[ni] * os * 2, vel * 0.2, 1.5);
    }
  }
}

// ─── SFX (very soft, ambient) ───
function sfxOink() {
  playTone(140, 0.2, 'sine', 0.03, 170);
  setTimeout(() => playTone(155, 0.12, 'sine', 0.02, 130), 60);
}

function sfxBoost() {
  // Most frequent SFX — must be very subtle
  playNoise(0.12, 0.015, 500);
  playTone(110, 0.2, 'sine', 0.025, 180);
}

function sfxCollect(comboLevel) {
  // Pitch rises ~4% per level (less than a semitone, avoids sounding like a scale)
  const mult = 1 + (comboLevel || 0) * 0.04;
  playTone(260 * mult, 0.35, 'sine', 0.035);
  setTimeout(() => playTone(330 * mult, 0.3, 'sine', 0.025), 100);
}

function sfxSuperFuel() {
  playTone(200, 0.5, 'sine', 0.03);
  setTimeout(() => playTone(260, 0.45, 'sine', 0.03), 120);
  setTimeout(() => playTone(330, 0.5, 'sine', 0.035), 240);
}

function sfxShield() {
  playTone(180, 0.6, 'sine', 0.035, 260);
  playTone(270, 0.6, 'sine', 0.02, 330);
}

function sfxMagnet() {
  playTone(220, 0.3, 'sine', 0.03, 160);
  setTimeout(() => playTone(180, 0.2, 'sine', 0.02), 80);
}

function sfxShieldBreak() {
  playNoise(0.2, 0.04, 700);
  playTone(220, 0.3, 'sine', 0.04, 110);
}

function sfxHit() {
  playNoise(0.3, 0.06, 600);
  playTone(90, 0.4, 'sine', 0.05, 45);
  setTimeout(() => playTone(65, 0.3, 'sine', 0.03, 35), 100);
}

function sfxMilestone() {
  // Soft chord bloom — all sine, low frequencies, gentle
  const notes = [196.00, 246.94, 293.66, 392.00]; // G3 B3 D4 G4
  notes.forEach((f, i) => {
    setTimeout(() => playTone(f, 1.0, 'sine', 0.03), i * 150);
  });
}

function sfxNearMiss() {
  // Quick subtle whoosh
  playNoise(0.06, 0.02, 800);
  playTone(300, 0.08, 'sine', 0.02, 200);
}

function sfxCombo(comboLevel) {
  // Pitch rises ~4% per level (subtle, non-musical intervals)
  const mult = 1 + (comboLevel || 0) * 0.04;
  playTone(300 * mult, 0.25, 'sine', 0.025);
  setTimeout(() => playTone(360 * mult, 0.2, 'sine', 0.02), 60);
}

function sfxWinner() {
  // Triumphant ascending arpeggio
  playTone(400, 0.3, 'sine', 0.04);
  setTimeout(() => playTone(500, 0.3, 'sine', 0.04), 100);
  setTimeout(() => playTone(600, 0.3, 'sine', 0.04), 200);
  setTimeout(() => playTone(800, 0.5, 'sine', 0.05), 300);
}

function sfxIgnition() {
  playNoise(0.5, 0.035, 400);
  playTone(55, 0.6, 'sine', 0.04, 130);
  setTimeout(() => {
    playNoise(0.3, 0.03, 500);
    playTone(100, 0.4, 'sine', 0.035, 200);
  }, 250);
  setTimeout(() => sfxOink(), 400);
}

// ─── CONSTANTS ───
const GRAVITY = 0.15;
const BOOST_POWER = -7;
const MAX_FALL = 4.5;
const HORIZONTAL_SPEED = 4.5;
const HORIZONTAL_DRAG = 0.93;
const FUEL_RADIUS = 14;
const BASE_SCROLL = 0.7;
const PIG_SIZE = 20;
const PIG_DRAW_SCALE = 0.7;
const ASTEROID_MIN_R = 14;
const ASTEROID_MAX_R = 30;
const NEAR_MISS_DIST = 12;

// ─── STATE ───
let state = 'menu';
let meters = 0;
let bonusPoints = 0;
let highScore = 0;
try { highScore = parseInt(localStorage.getItem('spacepig_v1') || '0'); } catch(e) {}
let pig = null;
let fuels = [];
let asteroids = [];
let powerups = [];
let stars = [];
let particles = [];
let texts = [];
let souls = [];    // flying orb ghosts heading to HUD
let cameraY = 0;
let gameOverTimer = 0;
let frameCount = 0;
let scrollSpeed = BASE_SCROLL;
let difficulty = 0;
let lastMilestone = 0;
let shakeTimer = 0, shakeIntensity = 0;
let combo = 0; // efficient fuel chain
let boostsSinceLastFuel = 0; // reset on fuel collect, ++ on boost
let pigMood = 'normal';
let pigMoodTimer = 0;
let comboTrails = [];   // visual lines between combo-collected fuels
let lastFuelPos = null; // track last fuel position for trails
let rocketFlash = 0;    // screen flash timer when rocket activates

// Intro state
let introTimer = 0;
const INTRO_DURATION = 150; // ~2.5 seconds
const INTRO_PHASE_BACK = 40;    // show back
const INTRO_PHASE_BOOST = 60;   // auto-boost fires
const INTRO_PHASE_TURN = 110;   // turning to face player
// 110-150: ready, brief pause then play

// ─── INPUT ───
const keys = {};
const MAX_TILT_ANGLE = 0.6;

// Virtual joystick state
const joystick = {
  active: false,
  id: -1,          // touch identifier
  cx: 0, cy: 0,    // center position (where thumb landed)
  dx: 0,           // normalized -1..1
  radius: 80       // max drag distance
};

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    handleAction();
  }
  if (['ArrowDown', 'ArrowUp', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.key)) {
    e.preventDefault();
  }
});
window.addEventListener('wheel', e => e.preventDefault(), { passive: false });
window.addEventListener('keyup', e => keys[e.code] = false);
canvas.addEventListener('mousedown', handleAction);

// Touch: left 1/3 of screen = joystick zone, anywhere else = boost
document.addEventListener('touchstart', e => {
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    const tx = t.clientX / S;
    const ty = t.clientY / S;
    if (tx < 0 || tx > W) continue; // ignore touches outside canvas
    if (tx < W * 0.35 && ty > H * 0.5 && !joystick.active && state === 'playing') {
      joystick.active = true;
      joystick.id = t.identifier;
      joystick.cx = tx;
      joystick.cy = ty;
      joystick.dx = 0;
    } else {
      handleAction();
    }
  }
  e.preventDefault();
}, { passive: false });

document.addEventListener('touchmove', e => {
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    if (joystick.active && t.identifier === joystick.id) {
      const tx = t.clientX / S;
      const dx = tx - joystick.cx;
      joystick.dx = Math.max(-1, Math.min(1, dx / joystick.radius));
    }
  }
  e.preventDefault();
}, { passive: false });

function handleTouchRelease(e) {
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    if (joystick.active && t.identifier === joystick.id) {
      joystick.active = false;
      joystick.id = -1;
      joystick.dx = 0;
    }
  }
}
document.addEventListener('touchend', handleTouchRelease);
document.addEventListener('touchcancel', handleTouchRelease);

function handleAction() {
  ensureAudio();
  startMusic();
  if (state === 'menu') {
    PokiSDK.gameplayStart();
    startIntro();
  } else if (state === 'gameover' && gameOverTimer <= 0) {
    state = 'waiting';
    PokiSDK.commercialBreak(() => {
      if (masterGain) masterGain.gain.value = 0;
    }).then(() => {
      if (masterGain) masterGain.gain.value = 1;
      PokiSDK.gameplayStart();
      startIntro();
    });
  } else if (state === 'playing') {
    boost();
  }
}

// ─── STARS ───
function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * W, y: Math.random() * H * 4,
      size: 0.5 + Math.random() * 2,
      brightness: 0.2 + Math.random() * 0.8,
      twinkle: 0.01 + Math.random() * 0.03
    });
  }
}

// ─── PIG ───
function createPig() {
  return {
    x: W / 2, y: H * 0.6, vx: 0, vy: 0,
    fuel: 11, angle: 0,
    boostTimer: 0, alive: true,
    shield: false, shieldTimer: 0,
    magnet: false, magnetTimer: 0,
    invincibleTimer: 0,
    rocketTimer: 0  // frames of free auto-propulsion remaining
  };
}

function boost() {
  if (!pig || !pig.alive || pig.fuel <= 0) return;
  pig.fuel--;
  pig.vy = BOOST_POWER;
  pig.boostTimer = 12;
  boostsSinceLastFuel++;
  sfxBoost();
  addFartParticles(pig.x, pig.y + PIG_SIZE);
}

// ─── SPAWNING ───
function spawnFuels() {
  const spawnTop = cameraY - H * 1.5;
  let highest = cameraY;
  for (const f of fuels) if (f.y < highest) highest = f.y;

  const minGap = Math.max(90, 130 - difficulty * 25);
  const maxGap = Math.max(130, 190 - difficulty * 30);

  while (highest > spawnTop) {
    highest -= minGap + Math.random() * (maxGap - minGap);
    fuels.push({
      x: 20 + Math.random() * (W - 40),
      y: highest, type: 'fuel',
      pulse: Math.random() * Math.PI * 2
    });
  }
  fuels = fuels.filter(f => f.y < cameraY + H + 100);
}

function spawnAsteroids() {
  const spawnTop = cameraY - H * 1.5;
  let highest = cameraY;
  for (const a of asteroids) if (a.y < highest) highest = a.y;

  const gap = Math.max(80, 250 - difficulty * 130);

  const asteroidsPerRow = Math.max(1, Math.round(W / 390));
  while (highest > spawnTop) {
    highest -= gap + Math.random() * gap * 0.4;
    for (let ai = 0; ai < asteroidsPerRow; ai++) {
      const r = ASTEROID_MIN_R + Math.random() * (ASTEROID_MAX_R - ASTEROID_MIN_R);
      const verts = [];
      const n = 7 + Math.floor(Math.random() * 4);
      for (let i = 0; i < n; i++) {
        const angle = (i / n) * Math.PI * 2;
        const dist = r * (0.7 + Math.random() * 0.3);
        verts.push({ x: Math.cos(angle) * dist, y: Math.sin(angle) * dist });
      }
      asteroids.push({
        x: 20 + Math.random() * (W - 40),
        y: highest + (Math.random() - 0.5) * gap * 0.3, r,
        vx: (Math.random() - 0.5) * 1.2,
        rotSpeed: (Math.random() - 0.5) * 0.025,
        rot: Math.random() * Math.PI * 2,
        verts, nearMissed: false
      });
    }
  }
  asteroids = asteroids.filter(a => a.y < cameraY + H + 150);
}

function spawnPowerups() {
  const spawnTop = cameraY - H * 1.5;
  let highest = cameraY;
  for (const p of powerups) if (p.y < highest) highest = p.y;

  while (highest > spawnTop) {
    highest -= 800 + Math.random() * 400;
    const types = ['superfuel', 'shield', 'magnet'];
    const type = types[Math.floor(Math.random() * types.length)];
    powerups.push({
      x: 25 + Math.random() * (W - 50),
      y: highest, type,
      pulse: Math.random() * Math.PI * 2
    });
  }
  powerups = powerups.filter(p => p.y < cameraY + H + 100);
}

// ─── PARTICLES & EFFECTS ───
function addFartParticles(x, y) {
  for (let i = 0; i < 10; i++) {
    const green = Math.random() > 0.3;
    particles.push({
      x: x + (Math.random() - 0.5) * 12, y,
      vx: (Math.random() - 0.5) * 3, vy: Math.random() * 3 + 1,
      life: 1, decay: 0.025 + Math.random() * 0.03,
      size: 3 + Math.random() * 5,
      color: green ? (Math.random() > 0.5 ? '#66cc44' : '#88dd55') : '#aacc33'
    });
  }
}

function addCollectParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    particles.push({ x, y, vx: Math.cos(a) * 3, vy: Math.sin(a) * 3, life: 1, decay: 0.03, size: 3, color });
  }
}

function addExplosion(x, y, colors, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8,
      life: 1, decay: 0.015, size: 2 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

function addText(x, y, text, color, big) {
  texts.push({ x, y, text, color, life: 1, decay: big ? 0.01 : 0.02, big: !!big });
}

function addSoul(worldX, worldY, color, delay) {
  // Target: rightmost fuel orb in HUD (W - 20, 25)
  const targetX = W - 20;
  const targetY = 25;
  const screenY = worldY - cameraY;
  souls.push({
    x: worldX, y: screenY,
    targetX, targetY,
    progress: 0,
    speed: 0.06 + Math.random() * 0.02,
    startX: worldX, startY: screenY,
    color: color || '#44ffaa',
    delay: delay || 0,
    size: FUEL_RADIUS * 0.3
  });
}

// ─── INTRO ───
function startIntro() {
  state = 'intro';
  introTimer = 0;
  randomizeMusic(); // new root + mood each game
  meters = 0; bonusPoints = 0; frameCount = 0; cameraY = 0;
  scrollSpeed = BASE_SCROLL; difficulty = 0; lastMilestone = 0;
  pig = createPig();
  pig.vy = 0;
  fuels = []; asteroids = []; powerups = [];
  particles = []; texts = []; comboTrails = []; souls = [];
  lastFuelPos = null; rocketFlash = 0;
  gameOverTimer = 0; shakeTimer = 0;
  combo = 0; boostsSinceLastFuel = 0;
  pigMood = 'normal'; pigMoodTimer = 0;
  initStars();
}

function updateIntro() {
  introTimer++;
  updateParticles();
  updateTexts();

  // Phase: auto-boost fires at frame 60
  if (introTimer === INTRO_PHASE_BOOST) {
    sfxIgnition();
    pig.vy = BOOST_POWER * 0.6;
    pig.boostTimer = 20;
    shakeTimer = 12; shakeIntensity = 6;
    // Big jetpack ignition burst - fire colors!
    for (let i = 0; i < 30; i++) {
      const nozzleX = (Math.random() > 0.5 ? -6 : 6);
      particles.push({
        x: pig.x + nozzleX + (Math.random() - 0.5) * 6,
        y: pig.y + PIG_SIZE + 8,
        vx: (Math.random() - 0.5) * 3, vy: Math.random() * 6 + 3,
        life: 1, decay: 0.015 + Math.random() * 0.02,
        size: 5 + Math.random() * 8,
        color: ['#ff4400', '#ff6600', '#ffaa00', '#ffdd00', '#fff'][Math.floor(Math.random() * 5)]
      });
    }
    // Smoke ring
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2;
      particles.push({
        x: pig.x, y: pig.y + PIG_SIZE + 12,
        vx: Math.cos(a) * 4, vy: Math.sin(a) * 2 + 3,
        life: 0.8, decay: 0.012, size: 4 + Math.random() * 4,
        color: '#888'
      });
    }
  }

  // After boost, apply some physics
  if (introTimer > INTRO_PHASE_BOOST) {
    pig.vy += GRAVITY * 0.5;
    pig.y += pig.vy * 0.5;
  }

  // Trailing jetpack flame during boost phase - two nozzle streams
  if (introTimer > INTRO_PHASE_BOOST && introTimer < INTRO_PHASE_TURN) {
    // Left nozzle flame
    particles.push({
      x: pig.x - 6 + (Math.random() - 0.5) * 4,
      y: pig.y + PIG_SIZE + 4,
      vx: (Math.random() - 0.5) * 1.5, vy: Math.random() * 3 + 2,
      life: 1, decay: 0.04 + Math.random() * 0.02, size: 3 + Math.random() * 4,
      color: ['#ff4400', '#ff6600', '#ffaa00', '#ffdd00'][Math.floor(Math.random() * 4)]
    });
    // Right nozzle flame
    particles.push({
      x: pig.x + 6 + (Math.random() - 0.5) * 4,
      y: pig.y + PIG_SIZE + 4,
      vx: (Math.random() - 0.5) * 1.5, vy: Math.random() * 3 + 2,
      life: 1, decay: 0.04 + Math.random() * 0.02, size: 3 + Math.random() * 4,
      color: ['#ff4400', '#ff6600', '#ffaa00', '#ffdd00'][Math.floor(Math.random() * 4)]
    });
    // Occasional smoke
    if (introTimer % 4 === 0) {
      particles.push({
        x: pig.x + (Math.random() - 0.5) * 12,
        y: pig.y + PIG_SIZE + 10,
        vx: (Math.random() - 0.5) * 1, vy: Math.random() * 1.5 + 1,
        life: 0.6, decay: 0.01, size: 4 + Math.random() * 5,
        color: '#666'
      });
    }
  }

  // Transition to playing
  if (introTimer >= INTRO_DURATION) {
    state = 'playing';
    pig.y = H * 0.5;
    pig.vy = -1;
    spawnFuels();
  }
}

// ─── GAME ───
function startGame() {
  // Called directly only as fallback; normally startIntro() is called
  state = 'playing';
  meters = 0; bonusPoints = 0; frameCount = 0; cameraY = 0;
  scrollSpeed = BASE_SCROLL; difficulty = 0; lastMilestone = 0;
  pig = createPig();
  fuels = []; asteroids = []; powerups = [];
  particles = []; texts = []; comboTrails = []; souls = [];
  lastFuelPos = null;
  gameOverTimer = 0; shakeTimer = 0;
  combo = 0; boostsSinceLastFuel = 0;
  pigMood = 'normal'; pigMoodTimer = 0;
  initStars();
  spawnFuels();
}

function die() {
  if (state !== 'playing') return;
  if (pig.invincibleTimer > 0) return;

  if (pig.shield) {
    pig.shield = false;
    pig.shieldTimer = 0;
    pig.invincibleTimer = 30;
    sfxShieldBreak();
    addExplosion(pig.x, pig.y, ['#66ccff', '#ffffff', '#aaddff'], 15);
    addText(pig.x, pig.y - 30, 'SHIELD!', '#66ccff');
    shakeTimer = 5; shakeIntensity = 4;
    return;
  }

  state = 'gameover';
  gameOverTimer = 60;
  pig.alive = false;
  sfxHit();
  PokiSDK.gameplayStop();
  // Vibrate on death (mobile)
  if (navigator.vibrate) navigator.vibrate([100, 50, 200, 50, 100]);
  addExplosion(pig.x, pig.y, ['#ff6b6b', '#ffcc00', '#ff9933', '#fff'], 30);
  shakeTimer = 15; shakeIntensity = 10;
  const totalScore = meters + bonusPoints;
  if (totalScore > highScore) {
    highScore = totalScore;
    try { localStorage.setItem('spacepig_v1', highScore.toString()); } catch(e) {}
  }
}

// ─── UPDATE ───
function update() {
  updateMusic();
  if (state === 'intro') { updateIntro(); return; }
  if (state !== 'playing') {
    updateParticles(); updateTexts();
    if (gameOverTimer > 0) gameOverTimer--;
    if (shakeTimer > 0) shakeTimer--;
    return;
  }
  frameCount++;

  difficulty = Math.min(1, frameCount / (60 * 90));
  scrollSpeed = BASE_SCROLL + difficulty * 1.4;

  pig.vy += GRAVITY;
  // Rocket auto-propulsion: softens gravity, no fuel cost
  if (pig.rocketTimer > 0) {
    pig.rocketTimer--;
    pig.vy -= 0.10; // counters 2/3 of gravity — gentle slow fall
    // Cap upward speed so boosts don't fly out of control during rocket
    if (pig.vy < -1.5) pig.vy = -1.5;
    // Red/orange exhaust particles
    if (frameCount % 3 === 0) {
      particles.push({
        x: pig.x + (Math.random() - 0.5) * 8,
        y: pig.y + PIG_SIZE,
        vx: (Math.random() - 0.5) * 1.5, vy: Math.random() * 2 + 1,
        life: 0.8, decay: 0.04, size: 2 + Math.random() * 3,
        color: ['#ff4400', '#ff6600', '#ffaa00'][Math.floor(Math.random() * 3)]
      });
    }
  }
  if (rocketFlash > 0) rocketFlash--;
  if (pig.vy > MAX_FALL) pig.vy = MAX_FALL;
  // Keyboard
  let keyTilt = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) keyTilt = -1;
  if (keys['ArrowRight'] || keys['KeyD']) keyTilt = 1;

  // Determine target tilt: joystick or keyboard
  const targetTilt = joystick.active ? joystick.dx : keyTilt;

  // Smoothly rotate pig toward target angle
  const targetAngle = targetTilt * MAX_TILT_ANGLE;
  pig.angle += (targetAngle - pig.angle) * 0.10;
  // Snap to zero when very close and no input
  if (!joystick.active && keyTilt === 0 && Math.abs(pig.angle) < 0.01) pig.angle = 0;

  // Angle drives horizontal force — scale with width so crossing time is constant
  const hScale = Math.max(1, Math.sqrt(W / 390));
  pig.vx += Math.sin(pig.angle) * 0.6 * hScale;
  pig.vx *= HORIZONTAL_DRAG;
  pig.vx = Math.max(-HORIZONTAL_SPEED * hScale, Math.min(HORIZONTAL_SPEED * hScale, pig.vx));
  pig.x += pig.vx;
  pig.y += pig.vy;

  if (pig.x < -PIG_SIZE) pig.x = W + PIG_SIZE;
  if (pig.x > W + PIG_SIZE) pig.x = -PIG_SIZE;

  if (pig.boostTimer > 0) {
    pig.boostTimer--;
    if (pig.boostTimer % 2 === 0) {
      particles.push({
        x: pig.x + (Math.random() - 0.5) * 8,
        y: pig.y + PIG_SIZE - 2,
        vx: (Math.random() - 0.5) * 2, vy: Math.random() * 2 + 0.5,
        life: 1, decay: 0.05, size: 2 + Math.random() * 3,
        color: Math.random() > 0.3 ? '#77cc33' : '#aadd44'
      });
    }
  }

  if (pig.shieldTimer > 0) { pig.shieldTimer--; if (pig.shieldTimer <= 0) pig.shield = false; }
  if (pig.magnetTimer > 0) { pig.magnetTimer--; if (pig.magnetTimer <= 0) pig.magnet = false; }
  if (pig.invincibleTimer > 0) pig.invincibleTimer--;

  if (pigMoodTimer > 0) { pigMoodTimer--; if (pigMoodTimer <= 0) pigMood = 'normal'; }

  cameraY -= scrollSpeed;
  const pigScreenY = pig.y - cameraY;
  if (pigScreenY < H * 0.35) cameraY = pig.y - H * 0.35;

  const height = Math.floor(-pig.y / 30);
  if (height > meters) meters = height;

  checkMilestones();
  spawnFuels();
  spawnAsteroids();
  spawnPowerups();

  if (pig.magnet) {
    for (const f of fuels) {
      const dx = pig.x - f.x, dy = pig.y - f.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 90) {
        f.x += dx / dist * 1.8;
        f.y += dy / dist * 1.8;
      }
    }
  }

  for (let i = fuels.length - 1; i >= 0; i--) {
    const f = fuels[i];
    const dx = pig.x - f.x, dy = pig.y - f.y;
    if (dx * dx + dy * dy < (PIG_SIZE + FUEL_RADIUS) * (PIG_SIZE + FUEL_RADIUS)) {
      pig.fuel++;
      // Combo: 1 boost (or 0) per fuel = chain continues
      if (boostsSinceLastFuel <= 1) {
        combo++;
        if (combo > 1) {
          bonusPoints += combo;
          sfxCombo(combo);
          // Trail color: green (#44ffaa) → red (#ff4444) over 10 levels
          const t = Math.min((combo - 1) / 14, 1);
          const tr = Math.round(0x44 + (0xff - 0x44) * t);
          const tg = Math.round(0xff - (0xff - 0x44) * t);
          const tb = Math.round(0xaa - (0xaa - 0x44) * t);
          const trailColor = `rgb(${tr},${tg},${tb})`;
          addText(f.x, f.y - 25, `x${combo} +${combo}`, '#ffee44');
          if (lastFuelPos) {
            comboTrails.push({
              x1: lastFuelPos.x, y1: lastFuelPos.y,
              x2: f.x, y2: f.y, life: 1, color: trailColor
            });
          }
        }
        // Combo x15 reward
        if (combo >= 15) {
          pig.fuel += 4;
          sfxWinner();
          addText(f.x, f.y - 50, '+4 FUEL', '#ffd700', true);
          for (let j = 0; j < 4; j++) addSoul(f.x, f.y, '#ffd700', j * 4);
          addExplosion(pig.x, pig.y, ['#ff4400', '#ff6600', '#ffaa00', '#ffdd00', '#fff'], 20);
          shakeTimer = 8; shakeIntensity = 5;
          combo = 0;
          lastFuelPos = null;
        }
      } else {
        combo = 1;
      }
      if (combo > 0) lastFuelPos = { x: f.x, y: f.y };
      boostsSinceLastFuel = 0;
      sfxCollect(combo);
      addCollectParticles(f.x, f.y, '#44ffaa');
      addSoul(f.x, f.y, '#44ffaa', 0);
      pigMood = 'happy'; pigMoodTimer = 30;
      fuels.splice(i, 1);
    }
  }

  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    const dx = pig.x - p.x, dy = pig.y - p.y;
    if (dx * dx + dy * dy < (PIG_SIZE + 16) * (PIG_SIZE + 16)) {
      // Superfuel counts as fuel for combo purposes
      if (p.type === 'superfuel') {
        if (boostsSinceLastFuel <= 1) {
          combo++;
          if (combo > 1) {
            bonusPoints += combo;
            sfxCombo(combo);
            const t = Math.min((combo - 1) / 14, 1);
            const tr = Math.round(0x44 + (0xff - 0x44) * t);
            const tg = Math.round(0xff - (0xff - 0x44) * t);
            const tb = Math.round(0xaa - (0xaa - 0x44) * t);
            const trailColor = `rgb(${tr},${tg},${tb})`;
            addText(p.x, p.y - 40, `x${combo} +${combo}`, '#ffee44');
            if (lastFuelPos) {
              comboTrails.push({
                x1: lastFuelPos.x, y1: lastFuelPos.y,
                x2: p.x, y2: p.y, life: 1, color: trailColor
              });
            }
          }
          if (combo >= 15) {
            pig.fuel += 4;
            sfxWinner();
            addText(p.x, p.y - 60, '+4 FUEL', '#ffd700', true);
            for (let j = 0; j < 4; j++) addSoul(p.x, p.y, '#ffd700', j * 4);
            addExplosion(pig.x, pig.y, ['#ff4400', '#ff6600', '#ffaa00', '#ffdd00', '#fff'], 20);
            shakeTimer = 8; shakeIntensity = 5;
            combo = 0;
            lastFuelPos = null;
          }
        } else {
          combo = 1;
        }
        if (combo > 0) lastFuelPos = { x: p.x, y: p.y };
        boostsSinceLastFuel = 0;
      }
      activatePowerup(p);
      pigMood = 'happy'; pigMoodTimer = 40;
      powerups.splice(i, 1);
    }
  }

  let nearAsteroid = false;
  for (const a of asteroids) {
    a.x += a.vx;
    a.rot += a.rotSpeed;
    if (a.x < -a.r * 2) a.x = W + a.r * 2;
    if (a.x > W + a.r * 2) a.x = -a.r * 2;

    const dx = pig.x - a.x, dy = pig.y - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const collisionDist = PIG_SIZE + a.r - 4;
    const nearMissDist = collisionDist + NEAR_MISS_DIST;
    const panicDist = collisionDist + 40;

    if (dist < collisionDist) {
      die();
    } else if (dist < nearMissDist && !a.nearMissed) {
      a.nearMissed = true;
      const bonus = 5 + Math.floor(difficulty * 10);
      bonusPoints += bonus;
      sfxNearMiss();
      addText(pig.x, pig.y - 30, `CLOSE! +${bonus}`, '#ff9944');
      shakeTimer = 2; shakeIntensity = 2;
    }
    if (dist < panicDist) nearAsteroid = true;
  }

  if (nearAsteroid && pigMood !== 'happy') {
    pigMood = 'panic'; pigMoodTimer = 10;
  }

  if (pig.y - cameraY > H + 50) die();

  updateParticles();
  updateTexts();
  updateComboTrails();
  updateSouls();
  if (shakeTimer > 0) shakeTimer--;
}

function activatePowerup(p) {
  if (p.type === 'superfuel') {
    pig.fuel += 3;
    sfxSuperFuel();
    addCollectParticles(p.x, p.y, '#ffd700');
    addText(p.x, p.y - 20, '+3 FUEL', '#ffd700');
    for (let j = 0; j < 3; j++) addSoul(p.x, p.y, '#ffd700', j * 10);
    shakeTimer = 3; shakeIntensity = 2;
  } else if (p.type === 'shield') {
    pig.shield = true;
    pig.shieldTimer = 60 * 10;
    sfxShield();
    addCollectParticles(p.x, p.y, '#66ccff');
    addText(p.x, p.y - 20, 'SHIELD', '#66ccff');
    shakeTimer = 3; shakeIntensity = 2;
  } else if (p.type === 'magnet') {
    pig.magnet = true;
    pig.magnetTimer = 60 * 6;
    sfxMagnet();
    addCollectParticles(p.x, p.y, '#ff66ff');
    addText(p.x, p.y - 20, 'MAGNET', '#ff66ff');
    shakeTimer = 3; shakeIntensity = 2;
  }
}

function checkMilestones() {
  const milestones = [50, 100, 200, 350, 500, 750, 1000, 1500, 2000];
  const names = ['LIFTOFF!', '100m!', 'STRATOSPHERE!', 'MESOSPHERE!', 'THERMOSPHERE!',
    'EXOSPHERE!', 'LOW ORBIT!', 'DEEP SPACE!', 'INTERSTELLAR!'];
  for (let i = 0; i < milestones.length; i++) {
    if (meters >= milestones[i] && lastMilestone < milestones[i]) {
      lastMilestone = milestones[i];
      sfxMilestone();
      addText(W / 2, H / 2, names[i], '#feca57', true);
      addExplosion(W / 2, H / 2 + 20, ['#feca57', '#ff9933', '#fff'], 20);
      shakeTimer = 6; shakeIntensity = 4;
      pig.fuel += 2;
      addText(W / 2, H / 2 + 30, '+2 FUEL', '#44ffaa');
    }
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function updateTexts() {
  for (let i = texts.length - 1; i >= 0; i--) {
    texts[i].y -= 0.5;
    texts[i].life -= texts[i].decay;
    if (texts[i].life <= 0) texts.splice(i, 1);
  }
}

function updateComboTrails() {
  for (let i = comboTrails.length - 1; i >= 0; i--) {
    comboTrails[i].life -= 0.012;
    if (comboTrails[i].life <= 0) comboTrails.splice(i, 1);
  }
}

function updateSouls() {
  for (let i = souls.length - 1; i >= 0; i--) {
    const s = souls[i];
    if (s.delay > 0) { s.delay--; continue; }
    s.progress += s.speed;
    // Ease-in-out curve
    const t = s.progress;
    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    s.x = s.startX + (s.targetX - s.startX) * ease;
    s.y = s.startY + (s.targetY - s.startY) * ease;
    // Arc upward in the middle
    s.y -= Math.sin(t * Math.PI) * 40;
    s.size *= 0.995;
    if (s.progress >= 1) souls.splice(i, 1);
  }
}

// ─── DRAWING ───
function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  const d = Math.min(1, Math.abs(cameraY) / 5000);
  grad.addColorStop(0, `rgb(${Math.round(5+d*10)},${Math.round(5+d*5)},${Math.round(Math.max(0,30-d*20))})`);
  grad.addColorStop(1, `rgb(${Math.round(8+d*15)},${Math.round(5+d*5)},${Math.round(Math.max(0,25-d*15))})`);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
}

function drawStars() {
  for (const s of stars) {
    const sy = ((s.y - cameraY * 0.3) % (H * 2));
    if (sy < -10 || sy > H + 10) continue;
    ctx.globalAlpha = s.brightness * (0.5 + Math.sin(frameCount * s.twinkle) * 0.5);
    ctx.fillStyle = '#fff';
    ctx.fillRect(s.x - s.size / 2, sy - s.size / 2, s.size, s.size);
  }
  ctx.globalAlpha = 1;
}

// ─── BACKGROUND SCENERY (huge, distant, atmospheric) ───
const scenery = [
  { alt: 75,   x: 0.80, parallax: 0.85, draw: drawBgMoon },
  { alt: 150,  x: 0.25, parallax: 0.70, draw: drawBgComet },
  { alt: 250,  x: 0.15, parallax: 0.82, draw: drawBgMars },
  { alt: 400,  x: 0.85, parallax: 0.75, draw: drawBgSaturn },
  { alt: 550,  x: 0.80, parallax: 0.70, draw: drawBgJupiter },
  { alt: 700,  x: 0.20, parallax: 0.65, draw: drawBgNebula },
  { alt: 900,  x: 0.18, parallax: 0.78, draw: drawBgFalcon },
  { alt: 1100, x: 0.50, parallax: 0.72, draw: drawBgMonolith },
  { alt: 1300, x: 0.80, parallax: 0.68, draw: drawBgSupernova },
  { alt: 1600, x: 0.75, parallax: 0.65, draw: drawBgBlackHole },
  { alt: 1800, x: 0.25, parallax: 0.60, draw: drawBgWormhole },
  { alt: 2200, x: 0.20, parallax: 0.80, draw: drawBgNostromo },
];

function drawScenery() {
  for (const s of scenery) {
    // When player is at this altitude, object is centered on screen.
    // Parallax makes it drift VERY slowly as camera moves.
    const centerCam = -s.alt * 30;
    const screenY = H * 0.45 + (centerCam - cameraY) * s.parallax;
    const screenX = s.x * W;
    // Generous margin for huge objects
    const margin = Math.min(W, H) * 0.7;
    if (screenY < -margin || screenY > H + margin) continue;
    // Only appear when player is getting close from below
    if (meters < s.alt - 40) continue;
    // Fade in as player approaches, fade out after passing
    const dist = Math.abs(meters - s.alt);
    let alpha;
    if (dist < 30) alpha = 0.3;
    else if (dist < 120) alpha = 0.3 * (1 - (dist - 30) / 90);
    else alpha = 0;
    if (alpha <= 0) continue;
    ctx.globalAlpha = alpha;
    ctx.save();
    s.draw(ctx, screenX, screenY);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ── Moon (huge, half in shadow) ──
function drawBgMoon(ctx, x, y) {
  const r = Math.min(W, H) * 0.35;
  // Atmospheric glow
  const glow = ctx.createRadialGradient(x, y, r * 0.8, x, y, r * 1.4);
  glow.addColorStop(0, 'rgba(200,200,220,0.08)');
  glow.addColorStop(1, 'rgba(200,200,220,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(x, y, r * 1.4, 0, Math.PI * 2); ctx.fill();
  // Main body
  const bodyGrad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.2, r * 0.1, x, y, r);
  bodyGrad.addColorStop(0, '#d0d0d8');
  bodyGrad.addColorStop(0.6, '#a0a0a8');
  bodyGrad.addColorStop(1, '#606068');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  // Shadow (terminator) - dark right side
  const shadow = ctx.createLinearGradient(x - r * 0.2, 0, x + r, 0);
  shadow.addColorStop(0, 'rgba(0,0,0,0)');
  shadow.addColorStop(0.5, 'rgba(0,0,0,0.15)');
  shadow.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = shadow;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  // Big craters
  const craters = [
    { cx: -0.25, cy: -0.2, cr: 0.12 },
    { cx: 0.1, cy: 0.25, cr: 0.09 },
    { cx: -0.35, cy: 0.15, cr: 0.07 },
    { cx: -0.05, cy: -0.4, cr: 0.06 },
    { cx: 0.2, cy: -0.1, cr: 0.10 },
    { cx: -0.15, cy: 0.35, cr: 0.05 },
  ];
  for (const c of craters) {
    const cx = x + c.cx * r, cy = y + c.cy * r, cr = c.cr * r;
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(180,180,190,0.08)';
    ctx.beginPath(); ctx.arc(cx - cr * 0.2, cy - cr * 0.2, cr * 0.7, 0, Math.PI * 2); ctx.fill();
  }
}

// ── Nostromo (big silhouette with lights) ──
function drawBgNostromo(ctx, x, y) {
  const s = Math.min(W, H) * 0.004;
  ctx.save();
  ctx.translate(x, y);
  // Main hull silhouette - long industrial ship
  ctx.fillStyle = '#2a2a35';
  ctx.beginPath();
  ctx.moveTo(-90 * s, 0);
  ctx.lineTo(-60 * s, -14 * s);
  ctx.lineTo(70 * s, -10 * s);
  ctx.lineTo(95 * s, -4 * s);
  ctx.lineTo(95 * s, 4 * s);
  ctx.lineTo(70 * s, 10 * s);
  ctx.lineTo(-60 * s, 14 * s);
  ctx.closePath();
  ctx.fill();
  // Engine block
  ctx.fillStyle = '#222230';
  ctx.fillRect(-100 * s, -20 * s, 20 * s, 40 * s);
  // Bridge tower
  ctx.fillStyle = '#2e2e3a';
  ctx.fillRect(65 * s, -18 * s, 25 * s, 28 * s);
  // Tiny windows (bridge)
  ctx.fillStyle = '#6688bb';
  for (let i = 0; i < 4; i++) {
    ctx.fillRect((70 + i * 5) * s, -8 * s, 2 * s, 2 * s);
  }
  // Engine glow
  const t = frameCount * 0.05;
  ctx.fillStyle = `rgba(80,140,255,${0.3 + Math.sin(t) * 0.15})`;
  ctx.beginPath(); ctx.arc(-100 * s, -8 * s, 5 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-100 * s, 8 * s, 5 * s, 0, Math.PI * 2); ctx.fill();
  // Cargo modules on top
  ctx.fillStyle = '#252530';
  ctx.fillRect(-30 * s, -22 * s, 18 * s, 8 * s);
  ctx.fillRect(-5 * s, -20 * s, 14 * s, 6 * s);
  ctx.fillRect(15 * s, -18 * s, 12 * s, 5 * s);
  // Red beacon
  const blink = Math.sin(frameCount * 0.08) > 0.3;
  if (blink) {
    ctx.fillStyle = 'rgba(255,50,50,0.6)';
    ctx.beginPath(); ctx.arc(85 * s, -18 * s, 3 * s, 0, Math.PI * 2); ctx.fill();
  }
  // Label
  ctx.fillStyle = 'rgba(120,130,150,0.5)';
  ctx.font = `${9 * s}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('USCSS NOSTROMO', 0, 26 * s);
  ctx.restore();
}

// ── Saturn (huge with prominent rings) ──
function drawBgSaturn(ctx, x, y) {
  const r = Math.min(W, H) * 0.28;
  // Outer ring glow
  const ringGlow = ctx.createRadialGradient(x, y, r * 1.2, x, y, r * 2.5);
  ringGlow.addColorStop(0, 'rgba(200,170,80,0.04)');
  ringGlow.addColorStop(1, 'rgba(200,170,80,0)');
  ctx.fillStyle = ringGlow;
  ctx.beginPath(); ctx.arc(x, y, r * 2.5, 0, Math.PI * 2); ctx.fill();
  // Back ring
  ctx.strokeStyle = 'rgba(200,170,90,0.35)';
  ctx.lineWidth = r * 0.08;
  ctx.beginPath(); ctx.ellipse(x, y, r * 2.2, r * 0.45, -0.1, Math.PI, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = 'rgba(180,150,70,0.2)';
  ctx.lineWidth = r * 0.15;
  ctx.beginPath(); ctx.ellipse(x, y, r * 1.7, r * 0.35, -0.1, Math.PI, Math.PI * 2); ctx.stroke();
  // Planet body
  const bodyGrad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.2, r * 0.1, x, y, r);
  bodyGrad.addColorStop(0, '#d4b060');
  bodyGrad.addColorStop(0.5, '#c0983a');
  bodyGrad.addColorStop(1, '#8a6a28');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  // Atmospheric bands
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.clip();
  const bandColors = ['rgba(160,120,40,0.25)', 'rgba(200,160,60,0.15)', 'rgba(140,100,30,0.2)', 'rgba(180,140,50,0.18)'];
  for (let i = 0; i < bandColors.length; i++) {
    const by = y - r + (i + 0.5) * (r * 2 / 5);
    ctx.fillStyle = bandColors[i];
    ctx.fillRect(x - r, by, r * 2, r * 0.15);
  }
  ctx.restore();
  // Front ring
  ctx.strokeStyle = 'rgba(200,170,90,0.35)';
  ctx.lineWidth = r * 0.08;
  ctx.beginPath(); ctx.ellipse(x, y, r * 2.2, r * 0.45, -0.1, 0, Math.PI); ctx.stroke();
  ctx.strokeStyle = 'rgba(180,150,70,0.2)';
  ctx.lineWidth = r * 0.15;
  ctx.beginPath(); ctx.ellipse(x, y, r * 1.7, r * 0.35, -0.1, 0, Math.PI); ctx.stroke();
}

// ── Mars (red planet, big) ──
function drawBgMars(ctx, x, y) {
  const r = Math.min(W, H) * 0.25;
  // Atmospheric haze
  const haze = ctx.createRadialGradient(x, y, r * 0.8, x, y, r * 1.3);
  haze.addColorStop(0, 'rgba(200,80,50,0.06)');
  haze.addColorStop(1, 'rgba(200,80,50,0)');
  ctx.fillStyle = haze;
  ctx.beginPath(); ctx.arc(x, y, r * 1.3, 0, Math.PI * 2); ctx.fill();
  // Body
  const bodyGrad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.25, r * 0.1, x, y, r);
  bodyGrad.addColorStop(0, '#c85a3a');
  bodyGrad.addColorStop(0.5, '#a84028');
  bodyGrad.addColorStop(1, '#6a2818');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  // Surface features
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.clip();
  // Dark regions
  ctx.fillStyle = 'rgba(80,25,15,0.25)';
  ctx.beginPath(); ctx.ellipse(x - r * 0.2, y + r * 0.1, r * 0.35, r * 0.2, 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(90,30,18,0.2)';
  ctx.beginPath(); ctx.ellipse(x + r * 0.3, y - r * 0.2, r * 0.25, r * 0.15, -0.2, 0, Math.PI * 2); ctx.fill();
  // Ice cap
  ctx.fillStyle = 'rgba(220,210,200,0.3)';
  ctx.beginPath(); ctx.ellipse(x, y - r * 0.85, r * 0.35, r * 0.12, 0, 0, Math.PI * 2); ctx.fill();
  // Olympus Mons (huge volcano shadow)
  ctx.fillStyle = 'rgba(60,20,10,0.15)';
  ctx.beginPath(); ctx.arc(x - r * 0.15, y + r * 0.3, r * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// ── Jupiter (massive, banded) ──
function drawBgJupiter(ctx, x, y) {
  const r = Math.min(W, H) * 0.45;
  // Atmospheric glow
  const glow = ctx.createRadialGradient(x, y, r * 0.9, x, y, r * 1.2);
  glow.addColorStop(0, 'rgba(200,160,100,0.05)');
  glow.addColorStop(1, 'rgba(200,160,100,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(x, y, r * 1.2, 0, Math.PI * 2); ctx.fill();
  // Body
  const bodyGrad = ctx.createRadialGradient(x - r * 0.25, y - r * 0.2, r * 0.1, x, y, r);
  bodyGrad.addColorStop(0, '#c8a878');
  bodyGrad.addColorStop(0.6, '#b08858');
  bodyGrad.addColorStop(1, '#705030');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  // Bands
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.clip();
  const bands = [
    { off: -0.75, h: 0.12, col: 'rgba(140,100,50,0.3)' },
    { off: -0.5, h: 0.10, col: 'rgba(180,140,70,0.2)' },
    { off: -0.25, h: 0.14, col: 'rgba(120,80,40,0.25)' },
    { off: 0.05, h: 0.12, col: 'rgba(160,120,60,0.2)' },
    { off: 0.3, h: 0.10, col: 'rgba(130,90,45,0.25)' },
    { off: 0.55, h: 0.08, col: 'rgba(150,110,55,0.2)' },
  ];
  for (const b of bands) {
    ctx.fillStyle = b.col;
    ctx.fillRect(x - r, y + b.off * r, r * 2, b.h * r);
  }
  // Great Red Spot
  ctx.fillStyle = 'rgba(180,60,30,0.3)';
  ctx.beginPath(); ctx.ellipse(x + r * 0.2, y + r * 0.18, r * 0.18, r * 0.09, 0.15, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(200,80,40,0.2)';
  ctx.beginPath(); ctx.ellipse(x + r * 0.2, y + r * 0.18, r * 0.12, r * 0.05, 0.15, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}
